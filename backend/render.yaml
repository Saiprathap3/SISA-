services:
  - type: web
    name: secureai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_VERSION
        value: 1.0.0
      - key: PYTHON_VERSION
        value: 3.11.0
